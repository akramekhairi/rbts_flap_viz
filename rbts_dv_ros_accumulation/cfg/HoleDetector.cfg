#!/usr/bin/env python3

from dynamic_reconfigure.parameter_generator_catkin import *

PACKAGE = "rbts_dv_ros_accumulation"
gen = ParameterGenerator()

gen.add("detector_mode", str_t, 0, "hough_preproc, hough_raw, or contour", "hough_preproc")
gen.add("threshold_mode", str_t, 0, "otsu, fixed, or none", "otsu")

gen.add("roi_top", int_t, 0, "Top row of the search ROI", 50, 0, 2048)
gen.add("roi_bottom", int_t, 0, "Bottom row of the search ROI", 590, 0, 2048)
gen.add("roi_left", int_t, 0, "Left column of the search ROI; <=0 means start of image", 0, 0, 2048)
gen.add("roi_right", int_t, 0, "Right column of the search ROI; <=0 means end of image", 0, 0, 2048)
gen.add("center_window_px", int_t, 0, "Center gate half-width for new hole registration", 200, 0, 2048)

gen.add("dp", double_t, 0, "Hough accumulator inverse resolution", 2.0, 0.1, 10.0)
gen.add("minDist", double_t, 0, "Hough minimum center distance; <=0 uses image height", -1.0, -1.0, 4096.0)
gen.add("param1", int_t, 0, "Hough Canny high threshold", 95, 1, 500)
gen.add("param2", int_t, 0, "Hough accumulator threshold", 40, 1, 500)
gen.add("minRadius", int_t, 0, "Broad-search minimum radius in pixels", 95, 1, 1024)
gen.add("maxRadius", int_t, 0, "Broad-search maximum radius in pixels", 120, 1, 1024)

gen.add("bilateral_enable", bool_t, 0, "Enable bilateral filter before Hough", False)
gen.add("bilateral_d", int_t, 0, "Bilateral filter diameter", 5, 1, 31)
gen.add("bilateral_sigma_color", double_t, 0, "Bilateral color sigma", 50.0, 0.0, 255.0)
gen.add("bilateral_sigma_space", double_t, 0, "Bilateral space sigma", 50.0, 0.0, 255.0)

gen.add("clahe_enable", bool_t, 0, "Enable CLAHE before thresholding", True)
gen.add("clahe_clip_limit", double_t, 0, "CLAHE clip limit", 2.0, 0.1, 20.0)
gen.add("clahe_tile_grid_x", int_t, 0, "CLAHE tile grid x", 8, 1, 64)
gen.add("clahe_tile_grid_y", int_t, 0, "CLAHE tile grid y", 8, 1, 64)

gen.add("threshold_value", int_t, 0, "Fixed threshold value", 80, 0, 255)
gen.add("morph_open_enable", bool_t, 0, "Enable morphology open", False)
gen.add("morph_open_kernel", int_t, 0, "Morph open kernel size", 3, 1, 31)
gen.add("morph_close_enable", bool_t, 0, "Enable morphology close", True)
gen.add("morph_close_kernel", int_t, 0, "Morph close kernel size", 3, 1, 31)

gen.add("publish_debug_preprocessed", bool_t, 0, "Publish ROI grayscale after filters", False)
gen.add("publish_debug_binary", bool_t, 0, "Publish ROI binary/cleaned image", False)

gen.add("track_radius_band_px", int_t, 0, "Tracking radius band around first hole", 8, 0, 128)
gen.add("track_y_band_px", int_t, 0, "Tracking y band around first hole; <=0 disables", 40, -1, 1024)
gen.add("persistence_n_frames", int_t, 0, "Temporal persistence window length", 5, 1, 50)
gen.add("persistence_k_required", int_t, 0, "Frames required inside persistence window", 3, 1, 50)
gen.add("dup_x_window_mm", double_t, 0, "Duplicate suppression distance in mm", 18.5, 0.0, 200.0)
gen.add("reject_edge_margin_px", int_t, 0, "Reject detections this close to image edges", 5, 0, 256)

exit(gen.generate(PACKAGE, "hole_detector", "HoleDetector"))
